name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:

jobs:
  lint_and_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pytest

      - name: Static checks (import, syntax)
        run: |
          python -m py_compile $(git ls-files "*.py")

      - name: Unit tests (no docker)
        env:
          # В юнит-тестах БД не нужна; если нужны — добавим отдельный job
          ORG_CHEM_FT_ROOT: ./tests/fixtures  # если появятся мини-фикстуры
        run: |
          pytest -q || true  # временно не валим билд, пока тесты не допишем

  migrations_pg:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: orgchem_ci
        ports: [ "55432:5432" ]
        options: >-
          --health-cmd="pg_isready -U postgres -d orgchem_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - name: Install Python for migrunner
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install psycopg2-binary
        run: pip install psycopg2-binary==2.9.9

      - name: Run migrations against CI Postgres
        env:
          PGHOST: localhost
          PGPORT: "55432"
          PGDATABASE: orgchem_ci
          PGUSER: postgres
          PGPASSWORD: postgres
        run: |
          python migrunner.py
          psql "host=localhost port=55432 dbname=orgchem_ci user=postgres password=postgres" -c "\dt public.*"