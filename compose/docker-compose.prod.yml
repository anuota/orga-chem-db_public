
services:
  ingest:
    build:
      context: ..
      dockerfile: docker/ingest.Dockerfile
    environment:
      PGHOST: db           # внутри сети compose БД доступна как 'db'
      PGPORT: "5432"
      ORG_CHEM_DATA_DIR: /data
      ORG_CHEM_FT_ROOT: /ftdata
    env_file:
      - ${ORG_CHEM_ENV_FILE:-../.env}
    volumes:
      - ../app/data:/app/data:ro
      - ${ORG_CHEM_ENV_FILE:-../.env}:/app/.env:ro
      - ${ORG_CHEM_HOST_DATA_DIR:?Set ORG_CHEM_HOST_DATA_DIR to host CSV directory}:/data:ro
      - ${ORG_CHEM_HOST_FT_DATA_DIR:?Set ORG_CHEM_HOST_FT_DATA_DIR to FT-DataForDatabase root}:/ftdata:ro

    depends_on:
      - db
      - migrate
    restart: "no"

  db:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - ${ORG_CHEM_ENV_FILE:-../.env}
    volumes:
      - dbdata:/var/lib/postgresql/data
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres} -h 127.0.0.1 -p 5432"]
      interval: 3s
      timeout: 3s
      retries: 30

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    env_file:
      - ${ORG_CHEM_ENV_FILE:-../.env}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    restart: unless-stopped

  mc-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: ["/bin/sh","-c"]
    env_file:
      - ${ORG_CHEM_ENV_FILE:-../.env}
    restart: on-failure
    command:
      - |
        set -e
        until mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do
          echo "waiting for minio..."
          sleep 2
        done
        # create bucket if not exists
        mc mb --ignore-existing local/orgchem
        # optional: make it private (default), keep for presigned-only access
        mc anonymous set private local/orgchem || true
        echo "MinIO ready with bucket 'orgchem'"

  migrate:
    image: ${MIGRATE_IMAGE:-compose-migrate:latest}
    build:
      context: ..
      dockerfile: docker/migrate.Dockerfile
    environment:
      PGHOST: db
      PGPORT: "5432"
      MIGRATIONS_DIR: /work/migrations
    env_file:
      - ${ORG_CHEM_ENV_FILE:-../.env}
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  app:
    image: ${APP_IMAGE:-compose-app:latest}
    build:
      context: ..
      dockerfile: docker/app/Dockerfile
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_started
    environment:
      PGHOST: db
      PGPORT: "5432"
      LOG_LEVEL: INFO
      ORG_CHEM_FT_ROOT: /ftdata
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET: orgchem
      MINIO_REGION: us-east-1
      # If FastAPI runs in the same compose under service 'api', use: http://api:8000/api
      # On mac local dev where API runs on host, use host.docker.internal
      # API_BASE: ${API_BASE:-http://host.docker.internal:8000/api}
      API_BASE: http://localhost:8000/api
      
      # GRID_SELECTION_COL_WIDTH: "28"
      # GRID_SAMPLE_COL_WIDTH: "120"
      # GRID_METHOD_COL_WIDTH: "40"
      # GRID_HEADER_HEIGHT: "120"
      # GRID_ROW_HEIGHT: "28"
      # GRID_FILTER_ROW_HEIGHT: "28"
      # GRID_DEFAULT_MIN_WIDTH: "28"
     
      # ...version 30.10.2025
      GRID_X_WIDTH: "40"          # X — width of the checkbox and method columns
      GRID_Y_WIDTH: "120"         # Y — width of the Sample column
      GRID_A_HEADER_HEIGHT: "120" # A — height of the header
      GRID_ROW_HEIGHT: "28"
      GRID_FILTER_ROW_HEIGHT: "28"

    env_file:
      - ${ORG_CHEM_ENV_FILE:-../.env}
    volumes:
      - ${ORG_CHEM_HOST_FT_DATA_DIR:?Set ORG_CHEM_HOST_FT_DATA_DIR to FT-DataForDatabase root}:/ftdata:ro
    ports:
      - "8000:8000"
    restart: unless-stopped 

volumes:
  dbdata:
  minio_data:
